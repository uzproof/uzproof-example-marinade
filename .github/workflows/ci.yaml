name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - name: Smoke — actually import @uzproof/verify-reader
        run: |
          npx tsx --eval "import('@uzproof/verify-reader').then((m) => { const need = ['hasQuestCompletion', 'getQuestCompletion', 'verifyBatch', 'SAS_PROGRAM_ID']; const missing = need.filter((k) => !(k in m)); if (missing.length) { console.error('Missing exports:', missing); process.exit(1); } console.log('verify-reader exports OK:', need.join(', ')); })"
